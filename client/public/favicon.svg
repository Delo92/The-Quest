<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="cGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="45%" stop-color="#111"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="bGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="40%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="cShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="rgba(0,0,0,0.9)"/>
    </filter>
    <filter id="bGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(34,197,94,0.7)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0a0a0a"/>

  <!-- C letter -->
  <text x="5" y="50" font-family="Arial Black, Arial" font-weight="900" font-size="48" fill="url(#cGrad)" filter="url(#cShadow)">C</text>

  <!-- B letter -->
  <text x="30" y="50" font-family="Arial Black, Arial" font-weight="900" font-size="48" fill="url(#bGrad)" filter="url(#bGlow)">B</text>

  <!-- Lightning bolt between C and B -->
  <polygon points="32,14 27,34 31,34 26,52 38,28 33,28 38,14" fill="white" opacity="0.95"/>
</svg>
